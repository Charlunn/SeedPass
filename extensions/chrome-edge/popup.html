<!doctype html>
<html lang="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SeedPass</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">SeedPass</p>
          <h1 data-i18n="title">SeedPass</h1>
          <p id="status" class="status">...</p>
        </div>
        <select id="language" class="language">
          <option value="auto">Auto / 自动</option>
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </header>

      <nav class="tabs">
        <button data-tab="site" class="tab active" data-i18n="tabSite">Current site / 当前网站</button>
        <button data-tab="records" class="tab" data-i18n="tabRecords">Records / 密码列表</button>
      </nav>

      <section id="setup-view" class="panel hidden">
        <h2 data-i18n="setupTitle">Create local vault / 创建本地保险库</h2>
        <label>
          <span data-i18n="seedLabel">Seed phrase or sentence / 基密码</span>
          <textarea id="setup-secret" rows="5" spellcheck="false"></textarea>
        </label>
        <p class="hint" data-i18n="seedHint"></p>
        <button id="generate-secret" class="secondary" data-i18n="generateSeed">Generate seed phrase / 生成助记词</button>
        <fieldset class="pin-field">
          <legend data-i18n="setPin">Set 6-digit PIN / 设置 6 位 PIN</legend>
          <div class="pin-row" data-pin="setup"></div>
        </fieldset>
        <fieldset class="pin-field">
          <legend data-i18n="confirmPin">Confirm PIN / 确认 PIN</legend>
          <div class="pin-row" data-pin="setupConfirm"></div>
        </fieldset>
        <label>
          <span data-i18n="unlockTimeout">Unlock timeout / 解锁有效期</span>
          <select id="setup-timeout">
            <option value="15">15 min / 15 分钟</option>
            <option value="5">5 min / 5 分钟</option>
            <option value="30">30 min / 30 分钟</option>
            <option value="60">60 min / 60 分钟</option>
          </select>
        </label>
        <button id="setup-submit" data-i18n="saveUnlock">Save and unlock / 保存并解锁</button>
      </section>

      <section id="unlock-view" class="panel hidden">
        <h2 data-i18n="unlockTitle">Unlock vault / 解锁保险库</h2>
        <fieldset class="pin-field">
          <legend data-i18n="enterPin">Enter 6-digit PIN / 输入 6 位 PIN</legend>
          <div class="pin-row" data-pin="unlock"></div>
        </fieldset>
        <label>
          <span data-i18n="unlockTimeout">Unlock timeout / 解锁有效期</span>
          <select id="unlock-timeout">
            <option value="15">15 min / 15 分钟</option>
            <option value="5">5 min / 5 分钟</option>
            <option value="30">30 min / 30 分钟</option>
            <option value="60">60 min / 60 分钟</option>
          </select>
        </label>
        <button id="unlock-submit" data-i18n="unlock">Unlock / 解锁</button>
      </section>

      <section id="site-view" class="panel">
        <div class="site-card">
          <span data-i18n="detectedSite">Detected site / 识别到的网站</span>
          <strong id="site-identity">-</strong>
          <small id="site-help"></small>
        </div>
        <div class="section-title">
          <h2 data-i18n="siteRecords">Saved records / 已保存记录</h2>
          <button id="new-site-record" class="secondary" data-i18n="addRecord">Add / 添加</button>
        </div>
        <div id="site-records" class="record-list"></div>
      </section>

      <section id="records-view" class="panel hidden">
        <label>
          <span data-i18n="searchRecords">Search records / 搜索记录</span>
          <input id="record-search" type="search" />
        </label>
        <div id="all-records" class="record-list"></div>
      </section>

      <section id="editor-view" class="panel hidden editor">
        <h2 id="editor-title"></h2>
        <input id="record-id" type="hidden" />
        <input id="record-site" type="hidden" />
        <label>
          <span data-i18n="accountLabel">Account label / 账号标识</span>
          <input id="record-account" type="text" />
        </label>
        <label>
          <span data-i18n="noteLabel">Note / 密码备注</span>
          <input id="record-note" type="text" />
        </label>
        <fieldset class="mode-field">
          <legend data-i18n="generationMode">Password is generated by / 密码生成方式</legend>
          <label class="radio">
            <input type="radio" name="record-mode" value="domain" checked />
            <span data-i18n="modeDomain">Use website name / 按网站生成</span>
          </label>
          <label class="radio">
            <input type="radio" name="record-mode" value="account" />
            <span data-i18n="modeAccount">Use account label only / 按账号标识生成</span>
          </label>
        </fieldset>
        <p id="mode-help" class="hint"></p>
        <div class="policy-grid">
          <label>
            <span data-i18n="length">Length / 密码长度</span>
            <input id="policy-length" type="number" min="8" max="64" step="1" />
          </label>
          <label class="check"><input id="policy-lowercase" type="checkbox" /> <span data-i18n="lowercase">lowercase / 小写</span></label>
          <label class="check"><input id="policy-uppercase" type="checkbox" /> <span data-i18n="uppercase">uppercase / 大写</span></label>
          <label class="check"><input id="policy-digits" type="checkbox" /> <span data-i18n="digits">digits / 数字</span></label>
          <label class="check"><input id="policy-symbols" type="checkbox" /> <span data-i18n="symbols">symbols / 符号</span></label>
        </div>
        <div class="button-row">
          <button id="save-record" data-i18n="saveRecord">Save / 保存</button>
          <button id="cancel-edit" class="secondary" data-i18n="cancel">Cancel / 取消</button>
          <button id="delete-record" class="danger" data-i18n="delete">Delete / 删除</button>
        </div>
      </section>

      <footer>
        <button id="lock-submit" class="secondary" data-i18n="lockNow">Lock now / 立即锁定</button>
        <p id="message" class="message" role="status"></p>
      </footer>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
